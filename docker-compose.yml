services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      start_period: 10s

  argus-ai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: redis://redis:6379
      # KUBECONFIG comes from .env. Set it to /kube/config to use the
      # mounted kubeconfig below; leave empty for offline mode.
    volumes:
      # Optional: mount a kubeconfig to let the k8s connector query a cluster.
      # Provide ./.kube/config locally (gitignored). Safe to leave absent.
      - ./.kube:/kube:ro
    extra_hosts:
      # Lets the container reach a host-published cluster API (k3d on Docker Desktop).
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      retries: 3
      start_period: 15s
