services:
  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-argus-redis-local}"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-argus-redis-local}", "ping"]
      interval: 5s
      retries: 5
      start_period: 10s

  # Optional local observability stack so the Prometheus/Loki tools have
  # something real to query. Safe to ignore if you only use Kubernetes.
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/local-config.yaml"

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./docker/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
    command:
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki

  argus-ai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: redis://redis:6379
      # KUBECONFIG comes from .env. Set it to /kube/config to use the
      # mounted kubeconfig below; leave empty for offline mode.
    volumes:
      # Optional: mount a kubeconfig to let the k8s connector query a cluster.
      # Provide ./.kube/config locally (gitignored). Safe to leave absent.
      - ./.kube:/kube:ro
    extra_hosts:
      # Lets the container reach a host-published cluster API (k3d on Docker Desktop).
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      retries: 3
      start_period: 15s
