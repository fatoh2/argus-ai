claude:
  api_key: "${ANTHROPIC_API_KEY}" # Populated via environment variable
  model: "claude-3-sonnet-20240229"

kubernetes:
  kubeconfig_path: "~/.kube/config" # Supports ~ expansion and environment variables (e.g., "${KUBECONFIG_PATH}") or leave empty for in-cluster

prometheus:
  url: "http://localhost:9090"

loki:
  url: "http://localhost:3100"

argocd:
  url: "https://argocd.example.com"
  token: "${ARGOCD_AUTH_TOKEN}"GOCD_AUTH_TOKEN}" # Populated via environment variable

github_actions:
  token: "${GITHUB_TOKEN}" # Populated via environment variable

argus_monitor:
  database_url: "${ARGUS_MONITOR_DB_URL}" # Populated via environment variable
